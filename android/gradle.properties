org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m
android.useAndroidX=true
android.enableJetifier=true
FLIPPER_VERSION=0.201.0
reactNativeArchitectures=armeabi-v7a,arm64-v8a,x86,x86_64
newArchEnabled=false
hermesEnabled=true

# Release signing (populate locally or via CI secrets — never commit real values)
AERO_UPLOAD_STORE_FILE=aero-release.keystore
AERO_UPLOAD_KEY_ALIAS=aero
AERO_UPLOAD_STORE_PASSWORD=CHANGE_ME_LOCALLY
AERO_UPLOAD_KEY_PASSWORD=CHANGE_ME_LOCALLY
